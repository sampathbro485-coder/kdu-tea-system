{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="premium-card p-4 p-xl-5">
            <div class="text-center mb-4">
                <i class="fas fa-cloud-upload-alt fa-3x text-success mb-3"></i>
                <h2 class="fw-bold">{{ factory_name }}</h2>
                <p>Factory: <strong>{{ factory_code }}</strong></p>
                <div class="bg-light p-3 rounded-4 d-inline-block">
                    <span class="badge bg-success">Expected Lipe: {{ factories[factory_code].expected_lipe }}</span>
                    <span class="badge bg-warning text-dark ms-2">Tolerance: ±{{ factories[factory_code].tolerance }}</span>
                </div>
            </div>
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label"><i class="fas fa-calendar-alt"></i> Report Date</label>
                    <input type="date" name="report_date" class="form-control" value="{{ today }}" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">TPMS Report (Excel .xlsx or CSV)</label>
                    <input type="file" name="report_file" class="form-control form-control-lg rounded-4" accept=".csv,.xlsx,.xls" required>
                </div>
                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
                    <button type="submit" class="btn btn-premium rounded-pill px-5">Upload & Prepare Email</button>
                </div>
            </form>
        </div>
        <div class="mt-3 text-center">
            <a href="{{ url_for('download_sample_excel') }}" class="btn btn-sm btn-outline-success"><i class="fas fa-file-excel"></i> Sample Excel</a>
            <a href="{{ url_for('download_sample_csv') }}" class="btn btn-sm btn-outline-secondary"><i class="fas fa-file-csv"></i> Sample CSV</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('uploadForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (!checkInternet()) return;

    const formData = new FormData(this);
    const submitBtn = this.querySelector('button[type="submit"]');
    const originalText = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';

    showModal('Uploading file, please wait...', true);

    try {
        const response = await fetch("{{ url_for('upload_tpms_no_analysis', factory_code=factory_code) }}", {
            method: 'POST',
            body: formData
        });
        const data = await response.json();
        hideModal();

        if (response.ok && data.success) {
            showToast('File uploaded successfully! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = data.redirect;
            }, 1500);
        } else {
            showToast(data.error || 'Upload failed', 'error');
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
        }
    } catch (err) {
        hideModal();
        showToast('Network error. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
    }
});
</script>
{% endblock %}
