{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="premium-card p-4">
            <h3 class="text-center"><i class="fas fa-industry text-warning"></i> Factory Access Control</h3>
            <p class="text-center">User: <strong>{{ username }}</strong> (ID: {{ user_id }})</p>
            <hr>
            <form method="post">
                <div class="row">
                    {% for code, info in factories.items() %}
                    <div class="col-md-6 mb-2">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="factories" value="{{ code }}" id="fac_{{ code }}"
                                   {% if code in current_perms %}checked{% endif %}>
                            <label class="form-check-label" for="fac_{{ code }}">
                                <strong>{{ code }}</strong> - {{ info.name }}
                            </label>
                        </div>
                    </div>
                    {% endfor %}
                </div>
                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
                    <button type="submit" class="btn btn-premium rounded-pill px-5">Save Permissions</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
