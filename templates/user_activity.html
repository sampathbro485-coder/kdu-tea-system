{% extends "base.html" %}
{% block content %}
<div class="premium-card p-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap">
        <h3><i class="fas fa-history text-info"></i> User Activity Log</h3>
        <h5>User: <strong>{{ user[0] }}</strong></h5>
    </div>
    <hr>
    <div class="table-responsive">
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Action</th>
                    <th>Details</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody>
                {% for act in activities %}
                <tr>
                    <td><span class="badge bg-secondary">{{ act[0] }}</span></td>
                    <td>{{ act[1] }}</td>
                    <td>{{ act[2] }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" class="text-center">No activities found for this user.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <div class="mt-3">
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-premium"><i class="fas fa-arrow-left"></i> Back to Admin</a>
    </div>
</div>
{% endblock %}
