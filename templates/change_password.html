{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="premium-card p-4">
            <h3 class="text-center"><i class="fas fa-key text-success"></i> Change Password</h3>
            <p class="text-center">User: <strong>{{ current_user.username }}</strong></p>
            <hr>
            <form method="post">
                <div class="mb-3">
                    <label class="form-label">Current Password</label>
                    <input type="password" name="old_password" class="form-control" required autocomplete="off">
                </div>
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" name="new_password" class="form-control" required minlength="4">
                    <div class="form-text">Minimum 4 characters</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-premium rounded-pill">Update Password</button>
                    <a href="{{ url_for('index') }}" class="btn btn-outline-secondary rounded-pill">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
